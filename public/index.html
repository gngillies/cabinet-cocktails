<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabinet Cocktails</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
  --border: #2a2a2a; --gold: #c9a84c; --amber: #e07b2a;
  --text: #f0ece4; --muted: #888888;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
.header { padding: 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; position: sticky; top: 0; background: #0d0d0d; z-index: 10; }
.header-icon { font-size: 1.7rem; line-height: 1; }
.header-title { font-family: 'Playfair Display', serif; font-size: 1.45rem; color: var(--gold); font-weight: 700; line-height: 1; }
.header-sub { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.16em; text-transform: uppercase; margin-top: 0.2rem; }
.main { padding: 1.25rem 1.1rem 5rem; max-width: 580px; margin: 0 auto; }
.upload-zone { border-radius: 18px; padding: 3rem 1.5rem 2.5rem; text-align: center; cursor: pointer; background: var(--surface); border: 2px solid var(--gold); transition: all 0.3s ease; position: relative; }
.upload-zone:hover { border-color: var(--amber); background: #1a1a1a; }
.upload-zone input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
.upload-icon-wrap { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 1.25rem; background: var(--surface2); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; }
.upload-icon { font-size: 2.2rem; }
.upload-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: #ffffff; margin-bottom: 0.4rem; }
.upload-hint { font-size: 0.78rem; color: var(--muted); line-height: 1.5; margin-bottom: 1.5rem; }
.jelly-btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.45rem; padding: 0.85rem 2.2rem; border-radius: 50px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; color: #3d1f00; background: linear-gradient(180deg, #ffda6b 0%, #f0a020 55%, #c97010 100%); box-shadow: 0 3px 0 #7a4800, 0 6px 16px rgba(240,160,32,0.45); transition: all 0.12s ease; position: relative; z-index: 3; }
.jelly-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #7a4800, 0 10px 24px rgba(240,160,32,0.55); }
.jelly-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #7a4800, 0 3px 8px rgba(240,160,32,0.3); }
.preview-wrap { position: relative; border-radius: 16px; overflow: hidden; margin-bottom: 1rem; }
.preview-img { width: 100%; max-height: 280px; object-fit: cover; display: block; }
.preview-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.82)); padding: 2rem 1rem 0.85rem; display: flex; justify-content: space-between; align-items: flex-end; }
.preview-label { font-size: 0.7rem; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; }
.btn-change { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.72rem; cursor: pointer; }
.img-info { font-size: 0.7rem; color: var(--muted); text-align: center; margin-bottom: 0.85rem; padding: 0.35rem; background: var(--surface2); border-radius: 8px; }
.btn-analyze { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--gold), var(--amber)); border: none; border-radius: 14px; color: #0d0d0d; font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.25s; }
.btn-analyze:hover { box-shadow: 0 8px 24px rgba(201,168,76,0.32); transform: translateY(-1px); }
.btn-secondary { width: 100%; padding: 0.9rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; color: var(--gold); font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1rem; }
.loading-wrap { padding: 3.5rem 1rem; text-align: center; }
.loading-bar { width: 100%; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 1.5rem; }
.loading-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--amber)); animation: loadbar 1.8s ease-in-out infinite; }
@keyframes loadbar { 0%{width:0%;margin-left:0} 50%{width:65%;margin-left:18%} 100%{width:0%;margin-left:100%} }
.loading-step { font-size: 0.82rem; color: var(--muted); }
.section { margin-top: 1.75rem; }
.section-label { font-size: 0.65rem; color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.bottles-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.bottle-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 0.28rem 0.8rem; font-size: 0.78rem; display: flex; align-items: center; gap: 0.35rem; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 0.75rem; cursor: pointer; transition: border-color 0.2s; overflow: hidden; }
.card:hover { border-color: rgba(201,168,76,0.4); }
.card.open { border-color: var(--gold); }
.card.wildcard { border-color: var(--amber); }
.card-img-wrap { width: 100%; height: 160px; overflow: hidden; position: relative; background: var(--surface2); }
.card-img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.85); transition: transform 0.4s ease; }
.card:hover .card-img { transform: scale(1.03); filter: brightness(0.95); }
.card-img-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.05) 30%, rgba(13,13,13,0.75) 100%); }
.card-img-badge { position: absolute; top: 0.7rem; right: 0.8rem; background: linear-gradient(135deg, var(--gold), var(--amber)); color: #0d0d0d; font-weight: 700; font-size: 0.9rem; padding: 0.22rem 0.65rem; border-radius: 8px; font-family: 'Playfair Display', serif; z-index: 2; }
.card-img-wc { position: absolute; top: 0.7rem; right: 0.8rem; background: var(--amber); color: #0d0d0d; font-size: 0.62rem; font-weight: 700; padding: 0.22rem 0.6rem; border-radius: 6px; letter-spacing: 0.1em; text-transform: uppercase; z-index: 2; }
.card-img-rank { position: absolute; bottom: 0.7rem; left: 0.9rem; font-size: 0.62rem; color: rgba(240,236,228,0.75); letter-spacing: 0.1em; text-transform: uppercase; z-index: 2; }
.card-body { padding: 0.9rem 1.1rem 1rem; }
.card-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.22rem; }
.card-tagline { font-size: 0.76rem; color: var(--muted); line-height: 1.45; }
.card-toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 0.65rem; }
.card-toggle-hint { font-size: 0.68rem; color: var(--gold); }
.chevron { color: var(--muted); font-size: 0.75rem; transition: transform 0.22s; }
.card.open .chevron { transform: rotate(180deg); }
.card-detail { display: none; padding: 1rem 1.1rem 1.1rem; border-top: 1px solid var(--border); }
.card.open .card-detail { display: block; }
.dl { font-size: 0.62rem; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.45rem; margin-top: 0.9rem; }
.dl:first-child { margin-top: 0; }
.ing-list { list-style: none; }
.ing-list li { font-size: 0.81rem; padding: 0.2rem 0; display: flex; align-items: flex-start; gap: 0.5rem; line-height: 1.4; }
.ing-list li::before { content: '-'; color: var(--gold); flex-shrink: 0; }
.inst { font-size: 0.81rem; color: var(--muted); line-height: 1.68; }
.flavor { font-size: 0.8rem; color: var(--muted); line-height: 1.62; font-style: italic; }
.error-box { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); border-radius: 14px; padding: 1.1rem 1.25rem; font-size: 0.82rem; color: #e07070; line-height: 1.6; margin-top: 1rem; }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">&#127864;</div>
  <div>
    <div class="header-title">Cabinet Cocktails</div>
    <div class="header-sub">AI-Powered Bar Intelligence</div>
  </div>
</div>
<div class="main" id="main"></div>
<script>
var imageBase64 = null;

// Curated verified image map - known good URLs from TheCocktailDB
var IMG_MAP = {
  'manhattan':    'https://www.thecocktaildb.com/images/media/drink/vrwquq1478252802.jpg',
  'martini':      'https://www.thecocktaildb.com/images/media/drink/71t8581504353095.jpg',
  'negroni':      'https://www.thecocktaildb.com/images/media/drink/qgdu971561574065.jpg',
  'boulevardier': 'https://www.thecocktaildb.com/images/media/drink/km84qi1513705868.jpg',
  'old fashioned':'https://www.thecocktaildb.com/images/media/drink/vrwquq1478252802.jpg',
  'whiskey sour': 'https://www.thecocktaildb.com/images/media/drink/hbkfsh1589574990.jpg',
  'whisky sour':  'https://www.thecocktaildb.com/images/media/drink/hbkfsh1589574990.jpg',
  'gimlet':       'https://www.thecocktaildb.com/images/media/drink/xgldt1513707271.jpg',
  'daiquiri':     'https://www.thecocktaildb.com/images/media/drink/mrz9091589574515.jpg',
  'aperol spritz':'https://www.thecocktaildb.com/images/media/drink/iloasq1587661955.jpg',
  'spritz':       'https://www.thecocktaildb.com/images/media/drink/iloasq1587661955.jpg',
  'moscow mule':  'https://www.thecocktaildb.com/images/media/drink/3pylqc1504370988.jpg',
  'mule':         'https://www.thecocktaildb.com/images/media/drink/3pylqc1504370988.jpg',
  'cosmopolitan': 'https://www.thecocktaildb.com/images/media/drink/kpsajh1504368362.jpg',
  'french 75':    'https://www.thecocktaildb.com/images/media/drink/zrxfbl1606773109.jpg',
  'clover club':  'https://www.thecocktaildb.com/images/media/drink/30aja61504348715.jpg',
  'aviation':     'https://www.thecocktaildb.com/images/media/drink/yrbplb1606855233.jpg',
  'plane':        'https://www.thecocktaildb.com/images/media/drink/yrbplb1606855233.jpg',
  'gin tonic':    'https://www.thecocktaildb.com/images/media/drink/qcgz0t1643821443.jpg',
  'gin & tonic':  'https://www.thecocktaildb.com/images/media/drink/qcgz0t1643821443.jpg',
  'smash':        'https://www.thecocktaildb.com/images/media/drink/iprva61606768774.jpg',
  'sidecar':      'https://www.thecocktaildb.com/images/media/drink/l72sik1606854964.jpg',
  'margarita':    'https://www.thecocktaildb.com/images/media/drink/5noda61589575158.jpg',
  'paloma':       'https://www.thecocktaildb.com/images/media/drink/samm5j1513706393.jpg',
  'sour':         'https://www.thecocktaildb.com/images/media/drink/hbkfsh1589574990.jpg',
  'fizz':         'https://www.thecocktaildb.com/images/media/drink/qcgz0t1643821443.jpg',
  'sling':        'https://www.thecocktaildb.com/images/media/drink/hbkfsh1589574990.jpg',
  'flip':         'https://www.thecocktaildb.com/images/media/drink/vrwquq1478252802.jpg',
  'royale':       'https://www.thecocktaildb.com/images/media/drink/zrxfbl1606773109.jpg',
  'reverse':      'https://www.thecocktaildb.com/images/media/drink/71t8581504353095.jpg',
  'chambery':     'https://www.thecocktaildb.com/images/media/drink/3pylqc1504370988.jpg'
};

// Spirit-based fallback images - when nothing else matches use the primary spirit
var SPIRIT_MAP = {
  'bourbon':  'https://www.thecocktaildb.com/images/media/drink/vrwquq1478252802.jpg',
  'whiskey':  'https://www.thecocktaildb.com/images/media/drink/hbkfsh1589574990.jpg',
  'whisky':   'https://www.thecocktaildb.com/images/media/drink/hbkfsh1589574990.jpg',
  'gin':      'https://www.thecocktaildb.com/images/media/drink/71t8581504353095.jpg',
  'vodka':    'https://www.thecocktaildb.com/images/media/drink/3pylqc1504370988.jpg',
  'rum':      'https://www.thecocktaildb.com/images/media/drink/mrz9091589574515.jpg',
  'tequila':  'https://www.thecocktaildb.com/images/media/drink/5noda61589575158.jpg',
  'brandy':   'https://www.thecocktaildb.com/images/media/drink/l72sik1606854964.jpg',
  'aperol':   'https://www.thecocktaildb.com/images/media/drink/iloasq1587661955.jpg',
  'campari':  'https://www.thecocktaildb.com/images/media/drink/qgdu971561574065.jpg',
  'vermouth': 'https://www.thecocktaildb.com/images/media/drink/71t8581504353095.jpg'
};

var DEFAULT_IMG = 'https://www.thecocktaildb.com/images/media/drink/metwgh1606770327.jpg';

function dbSearch(query, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://www.thecocktaildb.com/api/json/v1/1/search.php?s=' + encodeURIComponent(query));
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      cb(d.drinks && d.drinks[0] ? d.drinks[0].strDrinkThumb : null);
    } catch(e) { cb(null); }
  };
  xhr.onerror = function() { cb(null); };
  xhr.send();
}

function getPhoto(name, cb) {
  var lower = (name||'').toLowerCase();

  // 1. Check curated map first - instant, no network call needed
  for (var key in IMG_MAP) {
    if (lower.indexOf(key) !== -1) return cb(IMG_MAP[key]);
  }

  // 2. Try exact name search on CocktailDB
  dbSearch(name, function(p) {
    if (p) return cb(p);

    // 3. Try without "The" prefix
    var stripped = name.replace(/^the /i,'').trim();
    if (stripped !== name) {
      dbSearch(stripped, function(p2) {
        if (p2) return cb(p2);
        spiritFallback(lower, cb);
      });
    } else {
      spiritFallback(lower, cb);
    }
  });
}

function spiritFallback(lower, cb) {
  // 4. Match by spirit keyword - returns a relevant cocktail photo for that spirit
  for (var sp in SPIRIT_MAP) {
    if (lower.indexOf(sp) !== -1) return cb(SPIRIT_MAP[sp]);
  }
  // 5. Final fallback
  cb(DEFAULT_IMG);
}

function showUpload() {
  imageBase64 = null;
  var h = '<div class="upload-zone" id="uz">';
  h += '<input type="file" id="fi" accept="image/*" capture="environment">';
  h += '<div class="upload-icon-wrap"><div class="upload-icon">&#128247;</div></div>';
  h += '<div class="upload-title">Photograph Your Liquor Cabinet</div>';
  h += '<div class="upload-hint">Tap to take a photo - we will find every cocktail you can make</div>';
  h += '<button class="jelly-btn" id="cb">&#128247;&nbsp; Open Camera</button>';
  h += '</div>';
  document.getElementById('main').innerHTML = h;
  document.getElementById('fi').addEventListener('change', onFile);
  document.getElementById('cb').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('fi').click(); });
  document.getElementById('uz').addEventListener('click', function(e) { if (e.target.id !== 'fi' && e.target.id !== 'cb') document.getElementById('fi').click(); });
}

function onFile(e) {
  var file = e.target.files[0]; if (!file) return;
  var img = new Image();
  img.onload = function() {
    var MAX=1400, w=img.width, h=img.height;
    if (w>MAX||h>MAX) { var r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
    var c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    c.toBlob(function(blob) {
      var fr=new FileReader();
      fr.onload=function(ev){ imageBase64=ev.target.result.split(',')[1]; showPreview(c.toDataURL('image/jpeg',0.88),w,h,blob.size); };
      fr.readAsDataURL(blob);
    },'image/jpeg',0.88);
  };
  img.src=URL.createObjectURL(file);
}

function showPreview(url,w,h,size) {
  var h2='<div class="preview-wrap"><img src="'+url+'" class="preview-img">';
  h2+='<div class="preview-overlay"><span class="preview-label">Ready to analyze</span>';
  h2+='<button class="btn-change" onclick="showUpload()">Change photo</button></div></div>';
  h2+='<div class="img-info">'+w+'x'+h+'px - '+(size/1024).toFixed(0)+' KB</div>';
  h2+='<button class="btn-analyze" onclick="analyze()">&#128269; Discover My Cocktails</button>';
  document.getElementById('main').innerHTML=h2;
}

function analyze() {
  if (!imageBase64) return;
  var steps=['Scanning your cabinet...','Identifying bottles...','Cross-referencing recipes...','Crafting your list...','Inventing your Wildcard...'];
  var si=0;
  document.getElementById('main').innerHTML='<div class="loading-wrap"><div class="loading-bar"><div class="loading-fill"></div></div><div class="loading-step" id="ls">'+steps[0]+'</div></div>';
  var iv=setInterval(function(){ si=(si+1)%steps.length; var el=document.getElementById('ls'); if(el) el.textContent=steps[si]; },1600);
  var xhr=new XMLHttpRequest();
  xhr.open('POST','/analyze');
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.onload=function(){
    clearInterval(iv);
    try {
      if (xhr.status!==200) { var er=JSON.parse(xhr.responseText); throw new Error(er.error||'Server error '+xhr.status); }
      renderResults(JSON.parse(xhr.responseText));
    } catch(e){ showError(e.message); }
  };
  xhr.onerror=function(){ clearInterval(iv); showError('Network error - please try again'); };
  xhr.send(JSON.stringify({imageBase64:imageBase64,imageType:'image/jpeg'}));
}

function showError(msg) {
  document.getElementById('main').innerHTML='<div class="error-box"><strong>Something went wrong:</strong> '+esc(msg)+'</div><button class="btn-secondary" onclick="showUpload()">Try Again</button>';
}

function renderResults(r) {
  var bottles=r.bottles||[], cocktails=r.cocktails||[];
  var h='<div class="section"><div class="section-label">Detected in your cabinet</div><div class="bottles-list">';
  for (var i=0;i<bottles.length;i++) h+='<div class="bottle-tag"><span class="dot"></span>'+esc(bottles[i])+'</div>';
  h+='</div></div><div class="section"><div class="section-label">Cocktails you can make now</div>';
  for (var j=0;j<cocktails.length;j++) {
    var c=cocktails[j];
    h+='<div class="card" id="c'+j+'" onclick="toggle(\'c'+j+'\')">';
    h+='<div class="card-img-wrap"><img class="card-img" id="ci'+j+'" src="'+DEFAULT_IMG+'" loading="lazy">';
    h+='<div class="card-img-gradient"></div><div class="card-img-badge">'+c.score+'</div>';
    h+='<div class="card-img-rank">#'+(j+1)+' Recommended</div></div>';
    h+='<div class="card-body"><div class="card-name">'+esc(c.name)+'</div>';
    h+='<div class="card-tagline">'+esc(c.tagline)+'</div>';
    h+='<div class="card-toggle-row"><span class="card-toggle-hint">Tap for recipe</span><span class="chevron">&#9660;</span></div></div>';
    h+='<div class="card-detail"><div class="dl">Ingredients</div><ul class="ing-list">';
    var ings=c.ingredients||[]; for (var k=0;k<ings.length;k++) h+='<li>'+esc(ings[k])+'</li>';
    h+='</ul><div class="dl">Instructions</div><p class="inst">'+esc(c.instructions)+'</p>';
    if (c.flavorNote) h+='<div class="dl">Flavor Profile</div><p class="flavor">'+esc(c.flavorNote)+'</p>';
    h+='</div></div>';
  }
  h+='</div>';
  if (r.wildcard) {
    var w=r.wildcard;
    h+='<div class="section"><div class="section-label">Wildcard - original creation</div>';
    h+='<div class="card wildcard" id="cwc" onclick="toggle(\'cwc\')">';
    h+='<div class="card-img-wrap"><img class="card-img" id="wci" src="'+DEFAULT_IMG+'" loading="lazy">';
    h+='<div class="card-img-gradient"></div><div class="card-img-wc">Wildcard</div>';
    h+='<div class="card-img-rank">Claude\'s Original Recipe</div></div>';
    h+='<div class="card-body"><div class="card-name">'+esc(w.name)+'</div>';
    h+='<div class="card-tagline">'+esc(w.tagline)+'</div>';
    h+='<div class="card-toggle-row"><span class="card-toggle-hint">Tap for recipe</span><span class="chevron">&#9660;</span></div></div>';
    h+='<div class="card-detail">';
    if (w.rationale) h+='<div class="dl">The Concept</div><p class="flavor">'+esc(w.rationale)+'</p>';
    h+='<div class="dl">Ingredients</div><ul class="ing-list">';
    var wi=w.ingredients||[]; for (var wj=0;wj<wi.length;wj++) h+='<li>'+esc(wi[wj])+'</li>';
    h+='</ul><div class="dl">Instructions</div><p class="inst">'+esc(w.instructions)+'</p>';
    if (w.flavorNote) h+='<div class="dl">Flavor Science</div><p class="flavor">'+esc(w.flavorNote)+'</p>';
    h+='</div></div></div>';
  }
  h+='<button class="btn-secondary" onclick="showUpload()">&#128247; Scan Another Cabinet</button>';
  document.getElementById('main').innerHTML=h;
  for (var ci=0;ci<cocktails.length;ci++) loadPhoto(cocktails[ci].name,'ci'+ci);
  if (r.wildcard) loadPhoto(r.wildcard.name,'wci');
}

function loadPhoto(name,imgId) {
  getPhoto(name,function(url){ var el=document.getElementById(imgId); if(el) el.src=url; });
}

function toggle(id) { var el=document.getElementById(id); if(el) el.classList.toggle('open'); }

function esc(s) {
  if (!s) return '';
