<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabinet Cocktails</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --surface: #181818; --surface2: #222222;
  --border: #333; --border-bright: #444;
  --gold: #d4a843; --gold-light: #e8c26a; --amber: #e07b2a;
  --text: #f2ede4; --text-bright: #ffffff; --text-mid: #c8c0b4; --text-dim: #8a8078;
  --green: #5aab78;
  --font-display: 'Bebas Neue', sans-serif;
  --font-serif: 'Fraunces', Georgia, serif;
  --font-body: 'Outfit', sans-serif;
  --card-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.5);
  --card-hover-shadow: 0 16px 48px rgba(0,0,0,0.8), 0 4px 16px rgba(212,168,67,0.12);
}
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; background-image: radial-gradient(ellipse at 20% 0%, rgba(212,168,67,0.07) 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, rgba(224,123,42,0.05) 0%, transparent 50%); }
.header { padding: 1.1rem 1.25rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; position: sticky; top: 0; background: rgba(10,10,10,0.97); backdrop-filter: blur(16px); z-index: 50; }
.header-icon { font-size: 1.6rem; line-height: 1; }
.header-title { font-family: var(--font-display); font-size: 1.8rem; color: var(--gold); letter-spacing: 0.06em; line-height: 1; }
.header-sub { font-size: 0.58rem; color: var(--text-dim); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 0.15rem; }
.main { padding: 0 1.1rem 5rem; max-width: 600px; margin: 0 auto; }
.hero { padding: 2.5rem 0 0.5rem; text-align: center; animation: fadeUp 0.5s ease both; }
.hero-eyebrow { font-size: 0.62rem; color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
.hero-eyebrow::before, .hero-eyebrow::after { content: ''; display: block; width: 36px; height: 1px; background: var(--gold); opacity: 0.45; }
.hero-title { font-family: var(--font-display); font-size: clamp(2.8rem, 12vw, 4.2rem); line-height: 0.95; letter-spacing: 0.02em; color: var(--text-bright); margin-bottom: 0.5rem; }
.hero-title span { color: var(--gold); }
.hero-sub { font-family: var(--font-serif); font-style: italic; font-size: 1rem; color: var(--text-mid); margin-bottom: 2rem; line-height: 1.5; }
.upload-zone { border: 2px dashed var(--border-bright); border-radius: 20px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; background: var(--surface); transition: all 0.25s; position: relative; box-shadow: var(--card-shadow); }
.upload-zone:hover { border-color: var(--gold); background: rgba(212,168,67,0.04); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 2.8rem; margin-bottom: 0.85rem; }
.upload-title { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 0.04em; color: var(--text-bright); margin-bottom: 0.35rem; }
.upload-hint { font-size: 0.78rem; color: var(--text-mid); line-height: 1.5; }
.preview-wrap { position: relative; border-radius: 18px; overflow: hidden; margin-bottom: 1rem; box-shadow: var(--card-shadow); }
.preview-img { width: 100%; max-height: 300px; object-fit: cover; display: block; }
.preview-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85)); padding: 2rem 1rem 0.85rem; display: flex; justify-content: space-between; align-items: flex-end; }
.preview-label { font-size: 0.65rem; color: var(--gold); letter-spacing: 0.14em; text-transform: uppercase; }
.btn-change { background: rgba(255,255,255,0.15); border: none; color: var(--text-bright); padding: 0.3rem 0.85rem; border-radius: 20px; font-size: 0.72rem; cursor: pointer; font-family: var(--font-body); }
.img-info { font-size: 0.7rem; color: var(--text-dim); text-align: center; margin-bottom: 0.85rem; }
.cta-wrap { position: relative; margin-top: 1.5rem; }
.cta-label { font-size: 0.6rem; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; text-align: center; margin-bottom: 0.6rem; }
.btn-analyze { width: 100%; padding: 1.1rem 1.5rem; background: linear-gradient(135deg, var(--gold), var(--amber)); border: none; border-radius: 16px; color: #0a0a0a; font-family: var(--font-display); font-size: 1.55rem; letter-spacing: 0.06em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem; transition: all 0.25s; box-shadow: 0 4px 24px rgba(212,168,67,0.25); }
.btn-analyze:hover { box-shadow: 0 8px 36px rgba(212,168,67,0.4); transform: translateY(-2px); }
.btn-secondary { width: 100%; padding: 0.9rem; background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 14px; color: var(--gold); font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.04em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1rem; transition: border-color 0.2s; }
.btn-secondary:hover { border-color: var(--gold); }
.loading-wrap { padding: 4rem 1rem; text-align: center; }
.loading-bar { width: 100%; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 1.75rem; }
.loading-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--amber)); animation: loadbar 2s ease-in-out infinite; }
@keyframes loadbar { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:22%} 100%{width:0%;margin-left:100%} }
.loading-step { font-size: 0.82rem; color: var(--text-mid); letter-spacing: 0.04em; }
.section { margin-top: 2rem; animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.section-label { font-family: var(--font-display); font-size: 0.75rem; color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.6rem; }
.section-label::after { content:''; flex:1; height:1px; background: linear-gradient(to right, var(--border-bright), transparent); }
.bottles-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.bottle-tag { background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 20px; padding: 0.28rem 0.85rem; font-size: 0.76rem; color: var(--text-mid); display: flex; align-items: center; gap: 0.35rem; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--gold); flex-shrink:0; }
.hero-cta-banner { background: linear-gradient(135deg, rgba(212,168,67,0.12), rgba(224,123,42,0.08)); border: 1px solid rgba(212,168,67,0.3); border-radius: 18px; padding: 1.5rem 1.4rem 1.2rem; margin-top: 2rem; text-align: center; position: relative; overflow: hidden; }
.hero-cta-banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.cta-banner-title { font-family: var(--font-display); font-size: clamp(1.9rem, 8vw, 2.8rem); color: var(--text-bright); letter-spacing: 0.03em; line-height: 1; margin-bottom: 0.4rem; }
.cta-banner-title span { color: var(--gold); }
.cta-banner-sub { font-family: var(--font-serif); font-style: italic; font-size: 0.88rem; color: var(--text-mid); margin-bottom: 0.6rem; }
.cta-count { font-size: 0.62rem; color: var(--gold); letter-spacing: 0.16em; text-transform: uppercase; }
.card { background: var(--surface); border: 1px solid var(--border-bright); border-radius: 20px; margin-bottom: 1.1rem; cursor: pointer; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; box-shadow: var(--card-shadow); }
.card:hover { border-color: rgba(212,168,67,0.5); transform: translateY(-2px); box-shadow: var(--card-hover-shadow); }
.card.open { border-color: var(--gold); }
.card.wildcard { border-color: var(--amber); background: linear-gradient(160deg, var(--surface), rgba(224,123,42,0.06)); }
.card.wildcard::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: linear-gradient(90deg, var(--amber), var(--gold)); z-index:1; }
.mocktail-label {
  font-family: var(--font-display) !important;
  font-size: 1rem !important;
  color: #ffffff !important;
  background: #cc2200;
  padding: 0.45rem 1rem !important;
  border-radius: 8px;
  letter-spacing: 0.18em !important;
  display: inline-flex !important;
  width: auto !important;
  margin-bottom: 1rem;
  box-shadow: 0 2px 12px rgba(204,34,0,0.5);
}
.mocktail-label::after { display: none !important; }
.card.mocktail { border-color: #3a7a5a; background: linear-gradient(160deg, var(--surface), rgba(58,122,90,0.07)); }
.card.mocktail::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: linear-gradient(90deg, #3a7a5a, #5aab78); z-index:1; }
.mocktail-badge { position: absolute; top: 0.75rem; right: 0.85rem; background: #3a7a5a; color: #ffffff; font-size: 0.6rem; font-weight: 700; padding: 0.22rem 0.6rem; border-radius: 6px; letter-spacing: 0.1em; text-transform: uppercase; z-index: 2; }
.card-img-wrap { width: 100%; height: 190px; overflow: hidden; position: relative; background: var(--surface2); }
.card-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s ease, filter 0.3s ease; filter: brightness(0.78) saturate(1.1); }
.card:hover .card-img { filter: brightness(0.9) saturate(1.15); transform: scale(1.03); }
.card-img-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.05) 20%, rgba(10,10,10,0.8) 100%); }
.card-img-abv { position: absolute; top: 0.75rem; left: 0.85rem; background: rgba(10,10,10,0.82); border: 1px solid rgba(212,168,67,0.4); color: var(--gold-light); font-size: 0.66rem; font-weight: 600; padding: 0.22rem 0.6rem; border-radius: 6px; letter-spacing: 0.08em; z-index: 2; }
.card-img-glass { position: absolute; top: 0.75rem; right: 0.85rem; background: rgba(10,10,10,0.82); border: 1px solid rgba(212,168,67,0.3); color: var(--text-mid); font-size: 0.64rem; padding: 0.22rem 0.6rem; border-radius: 6px; z-index: 2; }
.card-img-wc-badge { position: absolute; top: 0.75rem; right: 0.85rem; background: var(--amber); color: #0a0a0a; font-size: 0.6rem; font-weight: 700; padding: 0.22rem 0.6rem; border-radius: 6px; letter-spacing: 0.1em; text-transform: uppercase; z-index: 2; }
.card-img-rank { position: absolute; bottom: 0.75rem; right: 0.85rem; font-size: 0.58rem; color: rgba(242,237,228,0.6); letter-spacing: 0.1em; text-transform: uppercase; z-index: 2; }
.card-body { padding: 1rem 1.2rem 1rem; }
.card-name { font-family: var(--font-display); font-size: 1.55rem; letter-spacing: 0.03em; line-height: 1.05; color: var(--text-bright); margin-bottom: 0.25rem; }
.card-tagline { font-size: 0.8rem; color: var(--text-mid); line-height: 1.5; }
.card-meta-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.65rem; flex-wrap: wrap; }
.card-pairs-label { font-size: 0.58rem; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 0.55rem; margin-bottom: 0.3rem; }
.card-pairs-tag { display: flex; align-items: center; gap: 0.35rem; background: rgba(212,168,67,0.1); border: 1px solid rgba(212,168,67,0.25); border-radius: 20px; padding: 0.25rem 0.7rem; font-size: 0.7rem; color: var(--gold-light); }
.card-toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 0.7rem; }
.card-toggle-hint { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.06em; }
.chevron { color: var(--text-dim); font-size: 0.7rem; transition: transform 0.22s; }
.card.open .chevron { transform: rotate(180deg); }
.card-detail { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--border); padding-top: 1rem; }
.card.open .card-detail { display: block; animation: fadeUp 0.25s ease; }
.dl { font-size: 0.6rem; color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 0.45rem; margin-top: 0.9rem; }
.dl:first-child { margin-top: 0; }
.ing-list { list-style: none; }
.ing-list li { font-size: 0.82rem; color: var(--text); padding: 0.22rem 0; display: flex; align-items: flex-start; gap: 0.5rem; line-height: 1.4; }
.ing-list li::before { content: '--'; color: var(--gold); font-size: 0.65rem; flex-shrink: 0; margin-top: 0.15rem; }
.inst { font-size: 0.82rem; color: var(--text-mid); line-height: 1.72; }
.flavor { font-size: 0.82rem; color: var(--text-mid); line-height: 1.68; font-style: italic; }
.glass-note { display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 0.55rem 0.8rem; font-size: 0.76rem; color: var(--text-mid); margin-top: 0.2rem; }
.glass-icon { font-size: 1.1rem; }
.error-box { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); border-radius: 14px; padding: 1.1rem 1.25rem; font-size: 0.82rem; color: #e07070; line-height: 1.6; margin-top: 1rem; }
.error-detail { margin-top: 0.6rem; font-size: 0.72rem; color: #c06060; font-family: monospace; background: rgba(0,0,0,0.3); padding: 0.5rem 0.65rem; border-radius: 6px; word-break: break-all; }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">🍸</div>
  <div>
    <div class="header-title">Cabinet Cocktails</div>
    <div class="header-sub">AI-Powered Bar Intelligence</div>
  </div>
</div>
<div class="main" id="main"></div>
<script>
var imageBase64 = null;
var imageType = 'image/jpeg';

// 47 cocktail photos hosted in this repo - visually verified, always available
var PHOTO_POOL = [
  'images/c01.jpg',
  'images/c03.jpg',
  'images/c04.jpg',
  'images/c05.jpg',
  'images/c06.jpg',
  'images/c07.jpg',
  'images/c08.jpg',
  'images/c09.jpg',
  'images/c10.jpg',
  'images/c11.jpg',
  'images/c12.jpg',
  'images/c13.jpg',
  'images/c14.jpg',
  'images/c15.jpg',
  'images/c16.jpg',
  'images/c17.jpg',
  'images/c18.jpg',
  'images/c19.jpg',
  'images/c20.jpg',
  'images/c21.jpg',
  'images/c22.jpg',
  'images/c23.jpg',
  'images/c24.jpg',
  'images/c25.jpg',
  'images/c26.jpg',
  'images/c27.jpg',
  'images/c28.jpg',
  'images/c29.jpg',
  'images/c30.jpg',
  'images/c31.jpg',
  'images/c32.jpg',
  'images/c33.jpg',
  'images/c34.jpg',
  'images/c35.jpg',
  'images/c36.jpg',
  'images/c37.jpg',
  'images/c38.jpg',
  'images/c39.jpg',
  'images/c40.jpg',
  'images/c41.jpg',
  'images/c42.jpg',
  'images/c43.jpg',
  'images/c44.jpg',
  'images/c45.jpg',
  'images/c46.jpg',
  'images/c47.jpg',
  'images/c48.jpg'
];

// Hash cocktail name to a stable index, then find nearest unused slot
// Same cocktail = same photo every time. Different cocktails = different photos.
function hashName(str) {
  var hash = 0;
  for (var i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash = hash & hash;
  }
  return Math.abs(hash);
}

function assignPhotos(names) {
  var assigned = {};
  var used = {};
  names.forEach(function(name) {
    var base = hashName(name) % PHOTO_POOL.length;
    var idx = base;
    var attempts = 0;
    while (used[idx] && attempts < PHOTO_POOL.length) {
      idx = (idx + 1) % PHOTO_POOL.length;
      attempts++;
    }
    used[idx] = true;
    assigned[name] = PHOTO_POOL[idx];
  });
  return assigned;
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toggle(id) { var el = document.getElementById(id); if (el) el.classList.toggle('open'); }

showUpload();

function showUpload() {
  imageBase64 = null;
  document.getElementById('main').innerHTML =
    '<div class="hero">' +
      '<div class="hero-eyebrow">Your Personal Bartender</div>' +
      '<div class="hero-title">What Can You<br><span>Make Tonight?</span></div>' +
      '<div class="hero-sub">Photograph your liquor cabinet.<br>Discover what cocktails you can craft right now.</div>' +
    '</div>' +
    '<div class="upload-zone" id="uz">' +
      '<input type="file" id="fi" accept="image/*" capture="environment">' +
      '<div class="upload-icon">&#128247;</div>' +
      '<div class="upload-title">Photograph Your Cabinet</div>' +
      '<div class="upload-hint">Tap to take a photo or choose one from your library.</div>' +
    '</div>';
  document.getElementById('fi').addEventListener('change', onFile);
  document.getElementById('uz').addEventListener('click', function(e) {
    if (e.target.tagName !== 'INPUT') document.getElementById('fi').click();
  });
}

function onFile(e) {
  var file = e.target.files[0]; if (!file) return;
  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onload = function() {
    var MAX = 1400, w = img.width, h = img.height;
    if (w > MAX || h > MAX) { var r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    imageType = 'image/jpeg';
    canvas.toBlob(function(blob) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        imageBase64 = ev.target.result.split(',')[1];
        showPreview(canvas.toDataURL('image/jpeg', 0.88), w, h, blob.size);
      };
      reader.readAsDataURL(blob);
    }, 'image/jpeg', 0.88);
  };
  img.src = url;
}

function showPreview(url, w, h, size) {
  document.getElementById('main').innerHTML =
    '<div class="preview-wrap"><img src="' + url + '" class="preview-img">' +
      '<div class="preview-overlay"><span class="preview-label">Ready to analyze</span>' +
      '<button class="btn-change" onclick="showUpload()">Change photo</button></div>' +
    '</div>' +
    '<div class="img-info">' + w + 'x' + h + 'px - ' + Math.round(size/1024) + ' KB</div>' +
    '<div class="cta-wrap">' +
      '<div class="cta-label">Tap to discover your cocktails</div>' +
      '<button class="btn-analyze" onclick="analyze()">&#128269; What Can I Make Tonight?</button>' +
    '</div>';
}

function analyze() {
  if (!imageBase64) return;

  // Show loading bar + skeleton cards immediately for perceived speed
  document.getElementById('main').innerHTML =
    '<div class="loading-wrap"><div class="loading-bar"><div class="loading-fill"></div></div>' +
    '<div class="loading-step" id="lstep">Scanning your cabinet...</div></div>' +
    '<div id="stream-results"></div>';

  var steps = ['Scanning your cabinet...','Identifying bottles...','Researching recipes...','Calculating flavors...','Building your cocktail menu...'];
  var si = 0;
  var iv = setInterval(function() {
    si = (si + 1) % steps.length;
    var el = document.getElementById('lstep');
    if (el) el.textContent = steps[si];
  }, 2000);

  // Track what we've received
  var bottlesRendered = false;
  var cocktailCount = 0;
  var mocktailCount = 0;
  var wildcardRendered = false;
  var photoNames = [];
  var photoMap = {};
  var photoIndex = 0;

  function getNextPhoto(name) {
    // Assign a unique photo from the pool in order
    if (photoMap[name]) return photoMap[name];
    var url = PHOTO_POOL[photoIndex % PHOTO_POOL.length];
    photoIndex++;
    photoMap[name] = url;
    return url;
  }

  function renderBottles(bottles) {
    var el = document.getElementById('stream-results');
    if (!el) return;
    var html = '<div class="section"><div class="section-label">Detected in your cabinet</div><div class="bottles-list">';
    bottles.forEach(function(b) { html += '<div class="bottle-tag"><span class="dot"></span>' + esc(b) + '</div>'; });
    html += '</div></div>';
    html += '<div class="hero-cta-banner"><div class="cta-banner-title">Cocktails You Can<br><span>Make Right Now</span></div>';
    html += '<div class="cta-banner-sub">Based on what&#39;s in your cabinet - no missing ingredients</div>';
    html += '<div class="cta-count" id="cocktail-count">Analyzing...</div></div>';
    html += '<div class="section" id="cocktail-cards"></div>';
    el.innerHTML = html;
    // Hide the loading step text once bottles show
    var lstep = document.getElementById('lstep');
    if (lstep) lstep.style.display = 'none';
  }

  function renderCocktailCard(c, index) {
    var container = document.getElementById('cocktail-cards');
    if (!container) return;
    var photo = getNextPhoto(c.name);
    var pairs = (c.pairsWith || []).map(function(p) {
      return '<span class="card-pairs-tag">&#127869; ' + esc(p) + '</span>';
    }).join('');
    var id = 'c' + index;
    var div = document.createElement('div');
    div.innerHTML = buildCard(id, c, photo, '#' + (index+1), pairs, false);
    div.firstChild.style.animation = 'fadeUp 0.3s ease both';
    container.appendChild(div.firstChild);
    // Scroll the new card into view gently
    div.firstChild && div.firstChild.scrollIntoView && div.firstChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function renderMocktailSection() {
    var el = document.getElementById('stream-results');
    if (!el || document.getElementById('mocktail-section')) return;
    var div = document.createElement('div');
    div.id = 'mocktail-section';
    div.innerHTML = '<div class="section"><div class="section-label mocktail-label">&#9670; Mocktails - Alcohol Free &#9670;</div><div id="mocktail-cards"></div></div>';
    el.appendChild(div);
  }

  function renderMocktailCard(m, index) {
    renderMocktailSection();
    var container = document.getElementById('mocktail-cards');
    if (!container) return;
    var photo = getNextPhoto('mocktail_' + index);
    var pairs = (m.pairsWith || []).map(function(p) {
      return '<span class="card-pairs-tag">&#127869; ' + esc(p) + '</span>';
    }).join('');
    var id = 'mc' + index;
    var div = document.createElement('div');
    div.innerHTML = buildCard(id, m, photo, null, pairs, 'mocktail');
    div.firstChild.style.animation = 'fadeUp 0.3s ease both';
    container.appendChild(div.firstChild);
  }

  function renderWildcard(w) {
    var el = document.getElementById('stream-results');
    if (!el) return;
    var photo = getNextPhoto('wildcard_' + w.name);
    var pairs = (w.pairsWith || []).map(function(p) {
      return '<span class="card-pairs-tag">&#127869; ' + esc(p) + '</span>';
    }).join('');
    var div = document.createElement('div');
    div.innerHTML = '<div class="section"><div class="section-label">Wildcard - Original Creation</div>' +
      buildCard('cwc', w, photo, null, pairs, 'wildcard') + '</div>';
    div.firstChild.style.animation = 'fadeUp 0.3s ease both';
    el.appendChild(div.firstChild);
    // Add scan again button
    var btn = document.createElement('button');
    btn.className = 'btn-secondary';
    btn.onclick = showUpload;
    btn.innerHTML = '&#128247; Scan Another Cabinet';
    el.appendChild(btn);
  }

  function buildCard(id, c, photo, rankLabel, pairs, cardType) {
    var cardClass = 'card' + (cardType === 'wildcard' ? ' wildcard' : cardType === 'mocktail' ? ' mocktail' : '');
    var badge = cardType === 'wildcard' ? '<div class="card-img-wc-badge">&#10022; Wildcard</div>' :
                cardType === 'mocktail' ? '<div class="mocktail-badge">&#9670; Mocktail</div>' : '';
    var abvBadge = c.abv ? '<div class="card-img-abv">' + esc(c.abv) + '</div>' : '';
    var glassBadge = c.glassware ? '<div class="card-img-glass">' + esc(c.glasswareIcon||'') + ' ' + esc(c.glassware) + '</div>' : '';
    var rankBadge = rankLabel ? '<div class="card-img-rank">' + esc(rankLabel) + '</div>' : (cardType === 'wildcard' ? '<div class="card-img-rank">Claude&#39;s Original Recipe</div>' : '');
    var glassDetail = c.glassware ? '<div class="dl">Serve In</div><div class="glass-note"><span class="glass-icon">' + esc(c.glasswareIcon||'&#127867;') + '</span> ' + esc(c.glassware) + '</div>' : '';
    var rationale = (cardType === 'wildcard' && c.rationale) ? '<div class="dl">The Concept</div><p class="flavor">' + esc(c.rationale) + '</p>' : '';
    var flavorLabel = cardType === 'wildcard' ? 'Flavor Science' : 'Flavor Profile';
    return '<div class="' + cardClass + '" id="' + id + '" onclick="toggle(\'' + id + '\')">' +
      '<div class="card-img-wrap">' +
        '<img class="card-img" src="' + photo + '" alt="' + esc(c.name) + '" loading="lazy">' +
        '<div class="card-img-gradient"></div>' +
        abvBadge + badge + (cardType !== 'wildcard' && cardType !== 'mocktail' ? glassBadge : '') + rankBadge +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-name">' + esc(c.name) + '</div>' +
        '<div class="card-tagline">' + esc(c.tagline) + '</div>' +
        (pairs ? '<div class="card-pairs-label">Food Pairings</div><div class="card-meta-row">' + pairs + '</div>' : '') +
        '<div class="card-toggle-row"><span class="card-toggle-hint">Tap for recipe</span><span class="chevron">&#9660;</span></div>' +
      '</div>' +
      '<div class="card-detail">' +
        rationale + glassDetail +
        '<div class="dl">Ingredients</div><ul class="ing-list">' +
        (c.ingredients||[]).map(function(x){return '<li>' + esc(x) + '</li>';}).join('') +
        '</ul><div class="dl">Instructions</div><p class="inst">' + esc(c.instructions) + '</p>' +
        (c.flavorNote ? '<div class="dl">' + flavorLabel + '</div><p class="flavor">' + esc(c.flavorNote) + '</p>' : '') +
      '</div></div>';
  }

  function finalize(totalCocktails) {
    clearInterval(iv);
    // Hide loading bar
    var loadWrap = document.querySelector('.loading-wrap');
    if (loadWrap) loadWrap.style.display = 'none';
    // Update count
    var countEl = document.getElementById('cocktail-count');
    if (countEl) countEl.textContent = totalCocktails + ' Cocktail' + (totalCocktails !== 1 ? 's' : '') + ' Ready - Tap Any Card for the Full Recipe';
  }

  // Connect to SSE stream
  var evtSource;
  if (typeof EventSource !== 'undefined') {
    // Use EventSource if available - it handles reconnection automatically
    // But we need POST, so we use fetch with ReadableStream instead
  }

  fetch('/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imageBase64: imageBase64, imageType: imageType })
  })
  .then(function(response) {
    if (!response.ok) return response.json().then(function(d){ throw new Error(d.error || 'Server error'); });
    var reader = response.body.getReader();
    var decoder = new TextDecoder();
    var lineBuffer = '';

    function processLine(line) {
      line = line.trim();
      if (!line.startsWith('data: ')) return;
      var jsonStr = line.slice(6);
      try {
        var obj = JSON.parse(jsonStr);
        var type = obj.type;
        var data = obj.data;

        if (type === 'bottles') {
          renderBottles(data);
          bottlesRendered = true;
        } else if (type === 'cocktail') {
          renderCocktailCard(data, cocktailCount);
          cocktailCount++;
        } else if (type === 'mocktail') {
          renderMocktailCard(data, mocktailCount);
          mocktailCount++;
        } else if (type === 'wildcard') {
          renderWildcard(data);
          wildcardRendered = true;
        } else if (type === 'done') {
          finalize(cocktailCount);
        } else if (type === 'error') {
          throw new Error(data);
        }
      } catch(e) {
        if (e.message && e.message !== 'Unexpected end of JSON input') {
          console.error('Stream parse error:', e.message);
        }
      }
    }

    function pump() {
      return reader.read().then(function(result) {
        if (result.done) {
          finalize(cocktailCount);
          return;
        }
        lineBuffer += decoder.decode(result.value, { stream: true });
        var lines = lineBuffer.split('\n');
        lineBuffer = lines.pop(); // keep incomplete last line
        lines.forEach(processLine);
        return pump();
      });
    }
    return pump();
  })
  .catch(function(err) {
    clearInterval(iv);
    document.getElementById('main').innerHTML =
      '<div class="error-box">Something went wrong<div class="error-detail">' + esc(err.message) + '</div></div>' +
      '<button class="btn-secondary" onclick="showUpload()">&#128247; Try Again</button>';
  });
}

function renderResults(r) {

    (c.ingredients || []).forEach(function(x) { html += '<li>' + esc(x) + '</li>'; });
    html += '</ul>';
    html += '<div class="dl">Instructions</div><p class="inst">' + esc(c.instructions) + '</p>';
    if (c.flavorNote) html += '<div class="dl">Flavor Profile</div><p class="flavor">' + esc(c.flavorNote) + '</p>';
    html += '</div></div>';
  });
  html += '</div>';

  // Mocktails
  if (r.mocktails && r.mocktails.length > 0) {
    html += '<div class="section"><div class="section-label mocktail-label">&#9670; Mocktails - Alcohol Free &#9670;</div>';
    r.mocktails.forEach(function(m, i) {
      var mcPhoto = photoMap[m.name + '__mocktail'];
      var mcPairs = (m.pairsWith || []).map(function(p) {
        return '<span class="card-pairs-tag">&#127869; ' + esc(p) + '</span>';
      }).join('');
      var mcId = 'mc' + i;
      html += '<div class="card mocktail" id="' + mcId + '" onclick="toggle(&#39;' + mcId + '&#39;)">';
      html += '<div class="card-img-wrap">';
      html += '<img class="card-img" src="' + mcPhoto + '" alt="' + esc(m.name) + '" loading="lazy">';
      html += '<div class="card-img-gradient"></div>';
      html += '<div class="mocktail-badge">&#9670; Mocktail</div>';
      if (m.glassware) html += '<div class="card-img-glass">' + esc(m.glasswareIcon || '') + ' ' + esc(m.glassware) + '</div>';
      html += '</div>';
      html += '<div class="card-body">';
      html += '<div class="card-name">' + esc(m.name) + '</div>';
      html += '<div class="card-tagline">' + esc(m.tagline) + '</div>';
      if (mcPairs) html += '<div class="card-pairs-label">Food Pairings</div><div class="card-meta-row">' + mcPairs + '</div>';
      html += '<div class="card-toggle-row"><span class="card-toggle-hint">Tap for recipe</span><span class="chevron">&#9660;</span></div>';
      html += '</div>';
      html += '<div class="card-detail">';
      if (m.glassware) {

      }

  // Wildcard
  if (r.wildcard) {

    html += '<div class="card-body">';
    html += '<div class="card-name">' + esc(w.name) + '</div>';

    }
    html += '<div class="dl">Ingredients</div><ul class="ing-list">';
    (w.ingredients || []).forEach(function(x) { html += '<li>' + esc(x) + '</li>'; });

}
